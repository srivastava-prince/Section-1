<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: rgb(161, 127, 255);
            text-decoration: underline wavy rgb(99, 36, 143);
        }

        .text {
            color: crimson;
            border: 1px solid crimson;


        }

        #mytext {
            background-color: rgb(42, 7, 219);
            color: burlywood;
            font-weight: bold;
        }

        h3 {

            color: blue;
        }

        .myclass {
            color: brown;
        }

        #myid {
            color: rgb(136, 235, 16);

        }
    </style>
</head>

<body>

    <h1 style="color:navy; font-size: 30px;">Inline CSS is used to style individual tag only</h1>
    <h2>Internal CSS is used to style multiple tags at once</h2>
    <h2 class="text">Name Selecctor is used to select element by their tag name </h2>
    <p class="text">Class Selector is used to select element by their class name </p>
    <p id="mytext">Id Selector is used to select elements by their id name </p>
    <h3 class="myclass" id="myid">Selector Priority</h3>
    <button class="btn">Submit</button>

</body>

</html>
