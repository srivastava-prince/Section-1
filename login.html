<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        .card{
            border: 2px solid rgb(194, 17, 17);
            width: 20%;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: antiquewhite;
            border-radius: 10px;
            padding: 20px;
        }
    </style>
</head>
<body>
    
<div class="card">
    <h2>Login Form </h2>
    <form>
        <label for="">Email Address</label>
        <input class="text-input" type="email">
        <br>
        <br>
          <label for="">Password</label>
          <input class="text-input" type="password">
          <br>
          <br>
          <button class="btn-submit">Submit</button><br>
          <br>
    </form>
</div>


</body>
</html>
