<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <h1>Student Addmission Form</h1>
    <form 
    <label for="">Student Name </label>
    <input type="text"required minlength="2">
    <br>
    <br>
    <label for="">Student Email </label>
    <input type="email">
    <br>
    <br>
    <label for="">Date Of Birth </label>
    <input type="date">
    <br>
    <br>
    <label for="">Address </label>
    <textarea cols="20" rows="4"></textarea>

    <br>
    <br>

    <label for="">Gender</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <br>
    <br>

    <label for="">Select Course</label>
    <Select>
        <option>Mern Stack Development </option>
        <option>Data Analitics </option>
        <option>Devops  </option>
        <option>UI Desgin </option>

        </select>
        <br>
        <br>
     <label for="">Select College</label>
     <input type="text" list="college">
     <datalist id="college">
        <option>Study Hall</option>
        <option>SRMCEM</option>
        <option>NPGC</option>
        <option>BBAU</option>
        <option>LU</option>


     </datalist>

     <br>
     <br>

     <input type="checkbox" id="terms">
     <label for="terms">Accept Term & Condition </label>

    <br>
    <br>
    <details>
        <summary>View Terms & Condition</summary>
        <p>Read Carefully All Document</p>
    </details>

    <button type="submit">Submit</button>
   </form>



</body>
</html>
